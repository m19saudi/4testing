<!DOCTYPE html><html lang="ar" dir="rtl"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">    <title>تطبيق الأذكار | Azkar App</title>    <link rel="icon" type="image/png" href="https://athkarapp.com/images/athkarLogo.png">    <link rel="apple-touch-icon" href="https://athkarapp.com/images/athkarLogo.png">    <link rel="manifest" href="manifest.json">    <meta name="mobile-web-app-capable" content="yes">    <meta name="apple-mobile-web-app-capable" content="yes">    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">        <style>        :root {            --bg-color: #F8F9FA;            --glass: #FFFFFF;            --border: rgba(0, 0, 0, 0.05);            --primary: #2D6A4F;            --accent: #52B788;            --text-main: #202124;            --text-sub: #5F6368;            --card-shadow: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.1);        }
        [data-theme="dark"] {            --bg-color: #121212;            --glass: #1E1E1E;            --border: rgba(255, 255, 255, 0.08);            --primary: #81C784;            --accent: #A5D6A7;            --text-main: #E8EAED;            --text-sub: #9AA0A6;        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Tajawal', sans-serif; }                body {             margin: 0;             padding: 0;             background: var(--bg-color);             color: var(--text-main);             height: 100vh;             display: flex;             flex-direction: column;             overflow: hidden;             transition: background 0.3s;        }
        header {             background: var(--glass);             border-bottom: 1px solid var(--border);             padding: env(safe-area-inset-top) 20px 0;             flex-shrink: 0;             z-index: 1000;        }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; }                #welcome-msg {             font-size: 1.2rem;             font-weight: 700;             display: flex;             align-items: center;             gap: 10px;             cursor: pointer;        }
        .nav-tabs {             display: flex;             overflow-x: auto;             gap: 24px;             padding: 0;             scrollbar-width: none;        }        .nav-tabs::-webkit-scrollbar { display: none; }                .tab {             padding: 12px 0;             white-space: nowrap;             font-weight: 500;             color: var(--text-sub);             transition: 0.3s;             cursor: pointer;            position: relative;            font-size: 0.95rem;        }                .tab.active {             color: var(--primary);             font-weight: 700;        }
        .tab.active::after {            content: '';            position: absolute;            bottom: 0;            left: 0;            width: 100%;            height: 3px;            background: var(--primary);            border-radius: 10px 10px 0 0;        }
        .content-slider { flex: 1; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; scrollbar-width: none; }        section { min-width: 100%; width: 100%; height: 100%; scroll-snap-align: start; overflow-y: auto; padding: 24px 20px; }
        .card {             background: var(--glass);             border: 1px solid var(--border);             border-radius: 24px;             padding: 24px;             margin-bottom: 20px;             box-shadow: var(--card-shadow);        }                .card:active { transform: scale(0.99); transition: 0.1s; }
        .next-p-header { text-align: center; padding-bottom: 20px; margin-bottom: 15px; }        .next-p-label { font-size: 0.9rem; color: var(--text-sub); margin-bottom: 8px; }        .next-p-time { font-size: 3rem; font-weight: 800; color: var(--text-main); letter-spacing: -1px; }
        .p-row {             display: flex;             justify-content: space-between;             align-items: center;             padding: 16px 8px;             border-bottom: 1px solid var(--border);         }        .p-row:last-child { border: none; }        .p-row.active { background: rgba(82, 183, 136, 0.08); border-radius: 16px; border-bottom: none; color: var(--primary); }                .p-name { font-weight: 700; font-size: 1.1rem; }        .p-iqama { font-size: 0.8rem; color: var(--text-sub); margin-top: 4px; }        .p-time { font-weight: 700; font-size: 1.1rem; }
        .zikr-item {             background: var(--glass);             border-radius: 20px;             padding: 20px;             margin-bottom: 16px;             border: 1px solid var(--border);             box-shadow: var(--card-shadow);        }        .zikr-item p { margin: 0 0 15px 0; line-height: 1.7; font-size: 1.1rem; color: var(--text-main); }
        .green-btn {             background: #EDF7F1;             color: var(--primary);             border: none;             padding: 14px;             border-radius: 16px;             font-weight: 700;             width: 100%;             transition: 0.2s;            cursor: pointer;        }        [data-theme="dark"] .green-btn { background: rgba(129, 199, 132, 0.1); color: var(--primary); }        .green-btn:active { background: var(--primary); color: white; transform: scale(0.97); }
        .red-btn { background: #FCE8E8; color: #D93025; border: none; padding: 14px; border-radius: 16px; font-weight: 700; width: 100%; cursor: pointer; }
        .tasbeeh-card { min-height: 320px; display: flex; align-items: center; justify-content: center; }        .tasbeeh-count-big { font-size: 5.5rem; font-weight: 300; color: var(--text-main); z-index: 2; }        .number-layout { font-size: 7rem; font-weight: 300; }                .hidden { display: none !important; }        .completed { opacity: 0.5; border: 1px solid var(--accent); transform: scale(0.98); }    </style></head><body data-theme="light">
<header>    <div class="top-bar">        <h2 id="welcome-msg" onclick="toggleVibration()">            <span>السلام عليكم يا سعد</span>            <span id="vib-icon"></span>        </h2>        <button onclick="toggleTheme()" style="background:none; border:none; font-size:1.4rem; cursor:pointer;">🌓</button>    </div>    <div class="nav-tabs" id="navTabs">        <div class="tab active" onclick="jump(0)">الرئيسية</div>        <div class="tab" onclick="jump(1)">الصلاة</div>        <div class="tab" onclick="jump(2)">الصباح</div>        <div class="tab" onclick="jump(3)">المساء</div>        <div class="tab" onclick="jump(4)">المسبحة</div>    </div></header>
<div class="content-slider" id="slider">    <section>        <div class="card" style="border: none; background: transparent; box-shadow: none; padding: 10px;">            <div id="display-date" style="font-weight: 700; color: var(--primary); font-size: 1.3rem;">...</div>            <div id="hijri-status" style="color: var(--text-sub); font-size: 1.1rem; margin-top: 5px;">...</div>            <div id="next-prayer-countdown" style="margin-top: 20px; font-size: 1.1rem; font-weight: 500;">جاري التحميل...</div>        </div>
        <div id="home-prayer-widget" class="card hidden">            <div id="modern-widget-content"></div>        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 10px;">            <div class="card" onclick="jump(2)" style="text-align:center; padding: 25px; margin:0">☀️ أذكار الصباح</div>            <div class="card" onclick="jump(3)" style="text-align:center; padding: 25px; margin:0">🌙 أذكار المساء</div>            <div class="card" onclick="jump(1)" style="text-align:center; padding: 25px; margin:0">🕌 مواقيت الصلاة</div>            <div class="card" onclick="jump(4)" style="text-align:center; padding: 25px; margin:0">📿 المسبحة</div>        </div>    </section>
    <section>        <div class="card">            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">                <div class="style-toggle-btns" style="display:flex; gap:8px">                    <button id="btn-style-new" class="mini-btn green-btn" style="padding: 6px 15px; width:auto; font-size:0.8rem" onclick="setWStyle('new')">جديد</button>                    <button id="btn-style-old" class="mini-btn green-btn" style="padding: 6px 15px; width:auto; font-size:0.8rem" onclick="setWStyle('old')">قديم</button>                </div>                <label style="display: flex; align-items: center; font-size: 0.85rem; color: var(--text-sub); cursor:pointer;">                    عرض بالرئيسية                     <input type="checkbox" id="widget-toggle" onchange="toggleWidgetView()" style="margin-right: 8px; width:18px; height:18px">                </label>            </div>            <h3 style="margin:0 0 15px 0; font-weight:800">مواقيت الصلاة - المبرز</h3>            <div id="prayer-list"></div>        </div>    </section>
    <section id="morning-section">        <h2 style="margin-bottom:20px; font-weight:800">أذكار الصباح</h2>        <div id="morning-list"></div>    </section>
    <section id="evening-section">        <h2 style="margin-bottom:20px; font-weight:800">أذكار المساء</h2>        <div id="evening-list"></div>    </section>
    <section>        <div class="card tasbeeh-card" onclick="tapTasbeeh()">            <div id="style-ring" class="ring-layout" style="position:relative; width:250px; height:250px; display:flex; align-items:center; justify-content:center;">                <svg viewBox="0 0 100 100" style="position:absolute; width:100%; height:100%; transform: rotate(-90deg);">                    <circle cx="50" cy="50" r="45" fill="none" stroke="var(--border)" stroke-width="3" />                    <circle id="ring-progress" cx="50" cy="50" r="45" fill="none" stroke="var(--primary)" stroke-width="4"                             stroke-dasharray="283" stroke-dashoffset="283" stroke-linecap="round" style="transition:0.3s;"/>                </svg>                <div class="tasbeeh-count-big counter-val">0</div>            </div>            <div id="style-number" class="number-layout hidden counter-val">0</div>        </div>        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px;">            <button class="green-btn" onclick="toggleTasbeehStyle()">تغيير الشكل</button>            <button class="red-btn" onclick="resetTasbeeh()">إعادة</button>        </div>        <select id="t-goal" class="green-btn" onchange="resetTasbeeh()" style="appearance: none; text-align-last: center; margin-top:12px">            <option value="999999">الهدف: حر</option>            <option value="33">الهدف: 33</option>            <option value="100">الهدف: 100</option>        </select>    </section></div>
<script>    let pTimes = null;    let state = {        tasbeeh: parseInt(localStorage.getItem('t_v')) || 0,        m_counts: JSON.parse(localStorage.getItem('m_c')) || [],        e_counts: JSON.parse(localStorage.getItem('e_c')) || [],        theme: localStorage.getItem('theme') || 'light',        t_style: localStorage.getItem('t_style') || 'ring',        showWidget: localStorage.getItem('show_w') === 'true',        wStyle: localStorage.getItem('w_style_pref') || 'new',        vibrate: localStorage.getItem('vibrate_on') !== 'false'    };
    const MORNING_DATA = [        { t: "آية الكرسي: اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ..", g: 1 },        { t: "أصبحنا وأصبح الملك لله، والحمد لله، لا إله إلا الله وحده لا شريك له", g: 1 },        { t: "اللهم أنت ربي لا إله إلا أنت، خلقتني وأنا عبدك، وأنا على عهدك ووعدك ما استطعت", g: 1 },        { t: "بسم الله الذي لا يضر مع اسمه شيء في الأرض ولا في السماء وهو السميع العليم", g: 3 },        { t: "رضيت بالله رباً، وبالإسلام ديناً، وبمحمد صلى الله عليه وسلم نبياً", g: 3 },        { t: "يا حي يا قيوم برحمتك أستغيث أصلح لي شأني كله ولا تكلني إلى نفسي طرفة عين", g: 1 },        { t: "سُبْحَانَ اللهِ وَبِحَمْدِهِ: عَدَدَ خَلْقِهِ، وَرِضَا نَفْسِهِ، وَزِنَةَ عَرْشِهِ، وَمِدَادَ كَلِمَاتِهِ", g: 3 },        { t: "سبحان الله وبحمده", g: 100 }    ];
    const EVENING_DATA = [        { t: "آية الكرسي: اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ..", g: 1 },        { t: "أمسينا وأمسى الملك لله، والحمد لله، لا إله إلا الله وحده لا شريك له", g: 1 },        { t: "اللهم أنت ربي لا إله إلا أنت، خلقتني وأنا عبدك، وأنا على عهدك ووعدك ما استطعت", g: 1 },        { t: "بسم الله الذي لا يضر مع اسمه شيء في الأرض ولا في السماء وهو السميع العليم", g: 3 },        { t: "أعوذ بكلمات الله التامات من شر ما خلق", g: 3 },        { t: "رضيت بالله رباً، وبالإسلام ديناً، وبمحمد صلى الله عليه وسلم نبياً", g: 3 },        { t: "يا حي يا قيوم برحمتك أستغيث أصلح لي شأني كله ولا تكلني إلى نفسي طرفة عين", g: 1 },        { t: "سبحان الله وبحمده", g: 100 }    ];
    if (state.m_counts.length === 0) state.m_counts = new Array(MORNING_DATA.length).fill(0);    if (state.e_counts.length === 0) state.e_counts = new Array(EVENING_DATA.length).fill(0);
    window.onload = () => {        const today = new Date().toLocaleDateString();        const lastDate = localStorage.getItem('last_use_date');        if (lastDate !== today) {            state.m_counts = new Array(MORNING_DATA.length).fill(0);            state.e_counts = new Array(EVENING_DATA.length).fill(0);            localStorage.setItem('m_c', JSON.stringify(state.m_counts));            localStorage.setItem('e_c', JSON.stringify(state.e_counts));            localStorage.setItem('last_use_date', today);        }        document.body.setAttribute('data-theme', state.theme);        document.getElementById('widget-toggle').checked = state.showWidget;        applyTasbeehStyle();        updateDateDisplay();        fetchPrayers();        updateTasbeehUI();        renderAzkar('morning', MORNING_DATA, state.m_counts);        renderAzkar('evening', EVENING_DATA, state.e_counts);        updateWidgetVisibility();        updateVibrationUI();                const slider = document.getElementById('slider');        slider.addEventListener('scroll', () => {            const i = Math.round(Math.abs(slider.scrollLeft) / window.innerWidth);            document.querySelectorAll('.tab').forEach((t, idx) => t.classList.toggle('active', idx === i));        });        setInterval(tick, 1000);    };
    async function fetchPrayers() {        const url = 'https://api.aladhan.com/v1/timingsByCity?city=Al%20Mubarraz&country=Saudi%20Arabia&method=4';        try {            const res = await fetch(url);            const data = await res.json();            pTimes = data.data.timings;            const h = data.data.date.hijri;            document.getElementById('hijri-status').innerText = h.day + " " + h.month.ar + " " + h.year + " هـ";            updateWidget();        } catch(e) { document.getElementById('hijri-status').innerText = "خطأ في الاتصال"; }    }
    function tick() {        updateDateDisplay();        if(pTimes) { updateCountdown(); updateWidget(); renderPrayerList(); }    }
    function updateWidget() {        if (!pTimes) return;        const labels = {Fajr:'الفجر', Dhuhr:'الظهر', Asr:'العصر', Maghrib:'المغرب', Isha:'العشاء'};        const iqamaMins = {Fajr:15, Dhuhr:15, Asr:15, Maghrib:10, Isha:10};        const now = new Date();        const keys = Object.keys(labels);        let nextP = getNextPrayer(now, keys, labels);        const container = document.getElementById('modern-widget-content');
        document.getElementById('btn-style-new').classList.toggle('active', state.wStyle === 'new');        document.getElementById('btn-style-old').classList.toggle('active', state.wStyle === 'old');

        let currentInIqama = null;        for (let k of keys) {            const [h, m] = pTimes[k].split(':');            const pTime = new Date(); pTime.setHours(h, m, 0);            const iqamaTime = new Date(pTime.getTime() + iqamaMins[k] * 60000);            if (now >= pTime && now < iqamaTime) {                currentInIqama = { k: k, name: labels[k], iqamaTime: iqamaTime, pTimeStr: pTimes[k] };                break;            }        }

        if (state.wStyle === 'old') {            let html = `<div style="display:flex; justify-content:space-between; text-align:center">`;            keys.forEach(k => {                const isCurr = currentInIqama && k === currentInIqama.k;                html += `<div style="display:flex; flex-direction:column; ${isCurr?'background:rgba(230,57,70,0.1);padding:5px;border-radius:8px':''}">                    <span style="font-size:0.8rem; opacity:0.6">${labels[k]}</span>                    <b style="color:var(--primary)">${format12(pTimes[k])}</b>                </div>`;            });            container.innerHTML = html + `</div>`;        } else {            let headerHtml = "";            if (currentInIqama) {                const diff = Math.floor((currentInIqama.iqamaTime - now) / 1000);                const mm = Math.floor(diff / 60); const ss = diff % 60;                headerHtml = `<div class="next-p-header">                    <div class="next-p-label" style="color:#D93025; font-weight:bold">حان وقت ${currentInIqama.name}</div>                    <div class="next-p-time" style="color:#D93025">${format12(currentInIqama.pTimeStr)}</div>                    <div style="font-size:0.9rem; opacity:0.8">باقي للإقامة: ${mm}:${ss < 10 ? '0'+ss : ss}</div>                </div>`;            } else {                headerHtml = `<div class="next-p-header">                    <div class="next-p-label">الصلاة القادمة: صلاة ${nextP.n}</div>                    <div class="next-p-time">${format12(pTimes[nextP.k])}</div>                </div>`;            }
            let rowsHtml = '<div style="display:flex; flex-direction:column; gap:10px">';            keys.forEach(k => {                const isActive = currentInIqama ? (k === currentInIqama.k) : (k === nextP.k);                const [h, m] = pTimes[k].split(':');                const pDate = new Date(); pDate.setHours(h, m, 0);                const iqamaDate = new Date(pDate.getTime() + iqamaMins[k] * 60000);                const iqamaStr = iqamaDate.toLocaleTimeString('ar-SA',{hour:'numeric',minute:'2-digit'});
                rowsHtml += `<div class="p-row ${isActive?'active':''}">                    <div style="display:flex; flex-direction:column">                        <span class="p-name">${labels[k]}</span>                        <span class="p-iqama">الإقامة: ${iqamaStr}</span>                    </div>                    <span class="p-time">${format12(pTimes[k])}</span>                </div>`;            });            container.innerHTML = headerHtml + rowsHtml + '</div>';        }    }

    function getNextPrayer(now, keys, labels) {        for (let k of keys) {            const [h, m] = pTimes[k].split(':');            const d = new Date(); d.setHours(h, m, 0);            if (d > now) return {n: labels[k], t: d, k: k};        }        const [h, m] = pTimes.Fajr.split(':');        const d = new Date(); d.setDate(d.getDate()+1); d.setHours(h, m, 0);        return {n: 'الفجر', t: d, k: 'Fajr'};    }

    function updateCountdown() {        if(!pTimes) return;        const now = new Date();        const labels = {Fajr:'الفجر', Dhuhr:'الظهر', Asr:'العصر', Maghrib:'المغرب', Isha:'العشاء'};        const iqamaMins = {Fajr:15, Dhuhr:15, Asr:15, Maghrib:10, Isha:10};        const keys = Object.keys(labels);        let displayNode = document.getElementById('next-prayer-countdown');
        let currentInIqama = null;        for (let k of keys) {            const [h, m] = pTimes[k].split(':');            const pTime = new Date(); pTime.setHours(h, m, 0);            const iqamaTime = new Date(pTime.getTime() + iqamaMins[k] * 60000);            if (now >= pTime && now < iqamaTime) { currentInIqama = { name: labels[k], time: iqamaTime }; break; }        }
        if (currentInIqama) {            const diff = Math.floor((currentInIqama.time - now) / 1000);            const mm = Math.floor(diff / 60); const ss = diff % 60;            displayNode.innerHTML = `<span style="color:#D93025">وقت صلاة ${currentInIqama.name}</span> • الإقامة خلال ${mm}:${ss < 10 ? '0'+ss : ss}`;        } else {            const next = getNextPrayer(now, keys, labels);            const diff = Math.floor((next.t - now) / 1000);            const hh = Math.floor(diff / 3600);            const mm = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');            const ss = (diff % 60).toString().padStart(2, '0');            displayNode.innerText = `صلاة ${next.n} خلال ${hh > 0 ? hh + ':' : ''}${mm}:${ss}`;        }    }

    function setWStyle(s) { state.wStyle = s; localStorage.setItem('w_style_pref', s); updateWidget(); }    function toggleWidgetView() { state.showWidget = document.getElementById('widget-toggle').checked; localStorage.setItem('show_w', state.showWidget); updateWidgetVisibility(); }    function updateWidgetVisibility() { document.getElementById('home-prayer-widget').classList.toggle('hidden', !state.showWidget); }
    function renderPrayerList() {        const container = document.getElementById('prayer-list');        const labels = {Fajr:'الفجر', Dhuhr:'الظهر', Asr:'العصر', Maghrib:'المغرب', Isha:'العشاء'};        const iqamaMins = {Fajr:15, Dhuhr:15, Asr:15, Maghrib:10, Isha:10};        const now = new Date(); const keys = Object.keys(labels);        let nextP = getNextPrayer(now, keys, labels);        let html = '';
        keys.forEach(k => {             const [h, m] = pTimes[k].split(':');            const pDate = new Date(); pDate.setHours(h, m, 0);            const iqDate = new Date(pDate.getTime() + iqamaMins[k] * 60000);            const iqStr = iqDate.toLocaleTimeString('ar-SA',{hour:'numeric',minute:'2-digit'});
            html += `<div class="p-row ${k===nextP.k?'active':''}">                <div style="display:flex; flex-direction:column">                    <span class="p-name">${labels[k]}</span>                    <span class="p-iqama">الإقامة: ${iqStr}</span>                </div>                <b class="p-time">${format12(pTimes[k])}</b>            </div>`;         });        container.innerHTML = html;    }

    function renderAzkar(type, data, counts) {        const c = document.getElementById(`${type}-list`);        c.innerHTML = '';        data.forEach((z, i) => {            const div = document.createElement('div');            const isDone = counts[i] >= z.g;            div.className = `zikr-item ${isDone ? 'completed' : ''}`;            div.innerHTML = `<p>${z.t}</p><button class="green-btn" onclick="incZ('${type}',${i})">${counts[i]} / ${z.g}</button>`;            c.appendChild(div);        });    }
    function incZ(type, i) {        let counts = type === 'morning' ? state.m_counts : state.e_counts;        let data = type === 'morning' ? MORNING_DATA : EVENING_DATA;        if(counts[i] < data[i].g) {            counts[i]++;            localStorage.setItem(type==='morning'?'m_c':'e_c', JSON.stringify(counts));            renderAzkar(type, data, counts);            if(state.vibrate && navigator.vibrate) navigator.vibrate(35);        }    }
    function tapTasbeeh() {        state.tasbeeh++;        const goal = parseInt(document.getElementById('t-goal').value);        if(state.tasbeeh > goal) state.tasbeeh = 1;        updateTasbeehUI();        localStorage.setItem('t_v', state.tasbeeh);        if(state.vibrate && navigator.vibrate) navigator.vibrate(45);    }
    function updateTasbeehUI() {        const goal = parseInt(document.getElementById('t-goal').value);        document.querySelectorAll('.counter-val').forEach(el => el.innerText = state.tasbeeh);        const offset = 283 - (Math.min(state.tasbeeh, goal) / goal) * 283;        document.getElementById('ring-progress').style.strokeDashoffset = offset;    }
    function toggleTasbeehStyle() { state.t_style = state.t_style === 'ring' ? 'number' : 'ring'; localStorage.setItem('t_style', state.t_style); applyTasbeehStyle(); }    function applyTasbeehStyle() { document.getElementById('style-ring').classList.toggle('hidden', state.t_style !== 'ring'); document.getElementById('style-number').classList.toggle('hidden', state.t_style !== 'number'); }    function resetTasbeeh() { state.tasbeeh = 0; updateTasbeehUI(); localStorage.setItem('t_v', 0); }    function jump(i) { document.getElementById('slider').scrollTo({ left: window.innerWidth * i, behavior: 'smooth' }); }    function toggleTheme() { state.theme = state.theme === 'light' ? 'dark' : 'light'; document.body.setAttribute('data-theme', state.theme); localStorage.setItem('theme', state.theme); }    function toggleVibration() { state.vibrate = !state.vibrate; localStorage.setItem('vibrate_on', state.vibrate); updateVibrationUI(); if(state.vibrate && navigator.vibrate) navigator.vibrate(50); }    function updateVibrationUI() { document.getElementById('vib-icon').innerText = state.vibrate ? "" : "🔇"; }    function format12(t) { if(!t) return ""; let [h, m] = t.split(':'); let s = h >= 12 ? 'م' : 'ص'; h = h % 12 || 12; return `${h}:${m} ${s}`; }    function updateDateDisplay() { const now = new Date(); document.getElementById('display-date').innerText = now.toLocaleDateString('ar-SA', {weekday:'long', day:'numeric', month:'long'}); }</script></body></html>
